esphome:
  name: pool-led-display
  friendly_name: Pool LED Display

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_pool_led-display

ota:
  platform: esphome
  password: !secret ota_pool_led-display

logger:
  level: INFO
  logs:
    api.connection: INFO

# I2C för BME280
i2c:
  sda: 21
  scl: 22
  scan: false


external_components:
  - source: github://TillFleisch/ESPHome-HUB75-MatrixDisplayWrapper@main

packages:
  wifi_diag: !include includes/common/wifi_diagnostics.yaml

font:
  - file: "fonts/spleen-5x8.bdf"
    id: small_font
    size: 8

  - file: "fonts/Roboto-Regular.ttf"
    id: small_font_utf8
    size: 8
    glyphs:
      [
        " !\"%()+=,-_.:°/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz",
        "ÅÄÖåäö"
      ]

  - file: "fonts/Roboto-Regular.ttf"
    id: big_font
    size: 16
    glyphs:
      [
        " !\"%()+=,-_.:°/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz",
        "ÅÄÖåäö"
      ]

image:
  - file: https://www.tilly.se/radiator.png
    id: heater_icon
    type: grayscale
    transparency: alpha_channel
    resize: 4x4


  # Altan media player control icons
  - file: mdi:play
    id: icon_play
    type: BINARY
    resize: 8x8
  
  - file: mdi:pause
    id: icon_pause
    type: BINARY
    resize: 8x8
  
  - file: mdi:stop
    id: icon_stop
    type: BINARY
    resize: 8x8

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Stockholm

globals:
  - id: display_page
    type: int
    restore_value: no
    initial_value: '0'

  - id: scroll_offset_artist
    type: int
    restore_value: no
    initial_value: '0'

  - id: scroll_offset_title
    type: int
    restore_value: no
    initial_value: '0'
 
  - id: stop_timer_millis
    type: unsigned long
    restore_value: no
    initial_value: '0'

  - id: stop_timer_active
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 30s
    then:
      - lambda: |-
          // Optimized page rotation: only check enabled pages
          int current_page = id(display_page);
          int new_page = current_page;
          
          // Try next 6 pages, but only check enabled ones
          for (int i = 1; i <= 6; i++) { 
            new_page = (current_page + i) % 6; 

            if ((new_page == 0 && id(display_spotify_enabled).state) ||
                (new_page == 1 && id(display_custom_enabled).state) ||
                (new_page == 2 && id(display_weather_enabled).state) ||
                (new_page == 3 && id(display_stats_enabled).state) ||
                (new_page == 4 && id(display_stop_timer_enabled).state) ||
                (new_page == 5 && id(display_debug_enabled).state)) { 
              id(display_page) = new_page;
              break;
            }
          }

  - interval: 50ms
    then:
      - lambda: |-
          if (id(display_page) == 0) {
            id(scroll_offset_artist) += 1;
            id(scroll_offset_title) += 1;
          } else if (id(display_page) == 1) {
            id(scroll_offset_title) += 1;
          }

  - interval: 100ms
    then:
      - lambda: |-
          static unsigned long start_time = 0;
          bool timer_running = id(stop_timer_running).state;
          
          if (timer_running && !id(stop_timer_active)) {
            start_time = millis();
            id(stop_timer_active) = true;
            id(stop_timer_millis) = 0;
          } else if (!timer_running && id(stop_timer_active)) {
            id(stop_timer_active) = false;
          }

          if (id(stop_timer_active)) {
            // Direct millis() difference calculation
            id(stop_timer_millis) = millis() - start_time;
          }

sensor:
  - platform: wifi_signal
    name: "Pool LED WiFi Signalstyrka"
    id: wifi_strength
    update_interval: 30s

  # BME280 – avkommentera detta block om sensorn ÄR ansluten (och kommentera bort dummy-blocket nedan)
  - platform: bme280_i2c
    temperature:
      name: "Pool LED Inner Temperatur"
      id: esp32_temp
    pressure:
      name: "Pool LED Inner Lufttryck"
    humidity:
      name: "Pool LED Inner Luftfuktighet"
    address: 0x76
    update_interval: 60s
  # Dummy – används när BME280 INTE är ansluten (kommentera bort om du använder BME280 ovan)
  #- platform: template
  #  name: "Pool LED Inner Temperatur (ej ansluten)"
  #  id: esp32_temp
  #  accuracy_decimals: 1
  #  unit_of_measurement: "°C"
  #  lambda: |-
  #    return NAN;
  #  update_interval: 60s

  - platform: homeassistant
    entity_id: sensor.pool_switch_electric_consumption_w
    id: pool_power_consumption
    name: "Pool Heater Power Consumption"

  - platform: homeassistant
    entity_id: sensor.current_pool_session_duration
    id: current_pool_session_duration
    name: "Aktiv tid i poolen"

  - platform: homeassistant
    entity_id: input_number.pool_session_max_people
    id: pool_max_people
    name: "Max People in Pool Session"

  - platform: homeassistant
    entity_id: sensor.pooldetect_person_active_count
    id: pooldetect_person_active_count
    name: "People in the pool"

  - platform: homeassistant
    entity_id: sensor.bestway_ph
    id: bestway_ph_sensor
    name: "Poolen pH"

  - platform: homeassistant
    entity_id: sensor.bestway_orp
    id: bestway_orp_sensor
    name: "Poolen ORP"

  - platform: homeassistant
    entity_id: sensor.bestway_temperature
    id: bestway_temperature_sensor
    name: "Poolen Temperatur"

  - platform: homeassistant
    entity_id: sensor.pool_pump_current_pool_pump_rpm
    id: pool_pump_rpm
    name: "Pool Pump RPM"

  - platform: homeassistant
    entity_id: weather.smhi_home
    attribute: temperature
    id: weather_temp

  - platform: homeassistant
    entity_id: media_player.altan
    attribute: volume_level
    id: altan_volume
    internal: true

binary_sensor:
  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_stop_timer
    id: display_stop_timer_enabled

  - platform: homeassistant
    entity_id: input_boolean.pool_led_timer_running
    id: stop_timer_running
    on_press:
      - lambda: |-
          // Instantly switch to the Stop Timer page
          id(display_page) = 4;
          id(stop_timer_active) = true;     // already used by your 100ms interval
          id(stop_timer_millis) = 0;        // optional: clear visible time on start
    on_release:
      - lambda: |-
          // Don't change page here; HA automation handles the 2 min grace + restore
          id(stop_timer_active) = false;

  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_spotify
    id: display_spotify_enabled
    on_press:
      - lambda: |-
          id(display_page) = 0;
    on_release:
      - lambda: |-
          if (id(display_page) == 0) {
            if (id(display_custom_enabled).state) id(display_page) = 1;
            else if (id(display_weather_enabled).state) id(display_page) = 2;
            else if (id(display_stats_enabled).state) id(display_page) = 3;
            else if (id(display_stop_timer_enabled).state) id(display_page) = 4;
            else if (id(display_debug_enabled).state) id(display_page) = 5;
          }

  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_custom_message
    id: display_custom_enabled
    on_press:
      - lambda: |-
          id(display_page) = 1;
    on_release:
      - lambda: |-
          if (id(display_page) == 1) {
            if (id(display_spotify_enabled).state) id(display_page) = 0;
            else if (id(display_weather_enabled).state) id(display_page) = 2;
            else if (id(display_stats_enabled).state) id(display_page) = 3;
            else if (id(display_stop_timer_enabled).state) id(display_page) = 4;
            else if (id(display_debug_enabled).state) id(display_page) = 5;
          }

  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_weather
    id: display_weather_enabled
    on_press:
      - lambda: |-
          id(display_page) = 2;
    on_release:
      - lambda: |-
          if (id(display_page) == 2) {
            if (id(display_spotify_enabled).state) id(display_page) = 0;
            else if (id(display_custom_enabled).state) id(display_page) = 1;
            else if (id(display_stats_enabled).state) id(display_page) = 3;
            else if (id(display_stop_timer_enabled).state) id(display_page) = 4;
            else if (id(display_debug_enabled).state) id(display_page) = 5;
          }

  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_stats
    id: display_stats_enabled
    on_press:
      - lambda: |-
          id(display_page) = 3;
    on_release:
      - lambda: |-
          if (id(display_page) == 3) {
            if (id(display_spotify_enabled).state) id(display_page) = 0;
            else if (id(display_custom_enabled).state) id(display_page) = 1;
            else if (id(display_weather_enabled).state) id(display_page) = 2;
            else if (id(display_stop_timer_enabled).state) id(display_page) = 4;
            else if (id(display_debug_enabled).state) id(display_page) = 5;
          }

  - platform: homeassistant
    entity_id: input_boolean.pool_led_display_debug
    id: display_debug_enabled
    on_press:
      - lambda: |-
          id(display_page) = 5;
    on_release:
      - lambda: |-
          if (id(display_page) == 5) {
            if (id(display_spotify_enabled).state) id(display_page) = 0;
            else if (id(display_custom_enabled).state) id(display_page) = 1;
            else if (id(display_weather_enabled).state) id(display_page) = 2;
            else if (id(display_stats_enabled).state) id(display_page) = 3;
            else if (id(display_stop_timer_enabled).state) id(display_page) = 4;
          }

text_sensor:
  - platform: homeassistant
    entity_id: media_player.spotify_htilly
    attribute: media_title
    id: spotify_media_title

  - platform: homeassistant
    entity_id: media_player.spotify_htilly
    attribute: media_artist
    id: spotify_media_artist

  - platform: homeassistant
    entity_id: sensor.pool_heater_hvac_mode
    id: heater_mode

  - platform: homeassistant
    entity_id: weather.smhi_home
    id: weather_condition

  - platform: homeassistant
    entity_id: input_text.pool_led_custom_message
    id: custom_display_text

  - platform: homeassistant
    entity_id: media_player.altan
    id: altan_media_state

switch:
  - platform: hub75_matrix_display
    matrix_id: matrix
    name: "Pool LED Power"
    restore_mode: ALWAYS_ON
    id: power

number:
  - platform: hub75_matrix_display
    matrix_id: matrix
    name: "Pool LED Brightness"

display:
  - platform: hub75_matrix_display
    id: matrix
    width: 64
    height: 32
    chain_length: 2
    driver: ICN2038S
    i2sspeed: HZ_15M
    R1_pin: 25
    G1_pin: 26
    B1_pin: 27
    R2_pin: 14
    G2_pin: 12
    B2_pin: 13
    A_pin: 23
    B_pin: 19
    C_pin: 5
    D_pin: 17
    LAT_pin: 4
    OE_pin: 15
    CLK_pin: 16
    update_interval: 0.1s
    clock_phase: false
    lambda: |-
        using namespace esphome::time;

        // Pre-defined common colors (reused throughout rendering)
        static const Color COLOR_WHITE(255, 255, 255);
        static const Color COLOR_BLACK(0, 0, 0);
        static const Color COLOR_RED(255, 0, 0);
        static const Color COLOR_DIM_RED(64, 0, 0);
        static const Color COLOR_GREEN(0, 255, 0);
        static const Color COLOR_BLUE(0, 0, 255);
        static const Color COLOR_YELLOW(255, 255, 0);
        static const Color COLOR_CYAN(0, 255, 255);
        static const Color COLOR_ORANGE(255, 166, 0);
        static const Color COLOR_TIME(100, 200, 255);
        static const Color COLOR_SPOTIFY_TITLE(0, 200, 255);
        static const Color COLOR_GRAY(128, 128, 128);
        static const Color COLOR_DARK_GRAY(64, 64, 64);
        static const Color COLOR_DEBUG_YELLOW(255, 255, 0);
        static const Color COLOR_DEBUG_BLUE(200, 200, 255);
        static const Color COLOR_DEBUG_GREEN(150, 255, 150);
        // Weather icon colors
        static const Color COLOR_SUN_YELLOW(255, 255, 100);  // Light yellow for sun
        static const Color COLOR_RAIN_BLUE(100, 150, 255);  // Light blue for rain
        static const Color COLOR_SNOW_WHITE(255, 255, 255);  // White for snow
        static const Color COLOR_LIGHTNING_YELLOW(255, 255, 50);  // Bright yellow for lightning

        // Static segment definitions (cached, not recreated every frame)
        struct Segment { float from; float to; Color color; };
        static const Segment ph_segments[] = {
                {6.0, 6.6, Color(219, 68, 55)},
                {6.6, 7.2, Color(255, 166, 0)},
                {7.2, 7.6, Color(67, 160, 71)},
                {7.6, 8.4, Color(255, 166, 0)},
                {8.4, 9.0, Color(219, 68, 55)}
        };
        static const Segment orp_segments[] = {
                {300, 400, Color(219, 68, 55)},
                {400, 550, Color(255, 166, 0)},
                {550, 650, Color(67, 160, 71)},
                {650, 900, Color(255, 166, 0)},
                {900, 1000, Color(219, 68, 55)}
        };
        struct ScrollCache {
            std::string last_text;
            std::string last_separator;
            std::vector<std::string> base_chars;
            std::vector<std::string> scroll_chars;
            int base_text_width_px = 0;
            int scroll_px = 0;
        };
        static ScrollCache artist_cache;
        static ScrollCache title_cache;
        static ScrollCache custom_cache;

        // Clear right-hand side area
        it.filled_rectangle(65, 0, 63, 32, COLOR_BLACK);

        auto now = id(sntp_time).now();
        int now_seconds = now.is_valid() ? now.second : 0;
        bool show_ph = (now_seconds % 30) < 15;

        // Show pH or ORP with segmented color bar and value indicator
        if (show_ph && id(bestway_ph_sensor).has_state()) {
                float ph = id(bestway_ph_sensor).state;
                it.printf(2, 0, id(small_font), COLOR_WHITE, TextAlign::TOP_LEFT, "pH %.1f", ph);

                // Segmented bar (6.0–9.0 = 64px range)
                for (auto& seg : ph_segments) {
                        int x_start = std::max(0, int((seg.from - 6.0f) / 3.0f * 64.0f));
                        int x_end   = std::min(63, int((seg.to - 6.0f) / 3.0f * 64.0f));
                        it.filled_rectangle(x_start, 9, x_end - x_start + 1, 2, seg.color);
                }

                int ph_x = int((ph - 6.0f) / 3.0f * 64.0f);
                if (ph_x >= 0 && ph_x < 64) {
                        it.line(ph_x, 8, ph_x, 11, COLOR_WHITE);
                }
        } else if (!show_ph && id(bestway_orp_sensor).has_state()) {
                float orp = id(bestway_orp_sensor).state;
                it.printf(2, 0, id(small_font), COLOR_WHITE, TextAlign::TOP_LEFT, "ORP %.0f", orp);

                // Segmented bar (300–1000 = 64px range)
                for (auto& seg : orp_segments) {
                        int x_start = std::max(0, int((seg.from - 300.0f) / 700.0f * 64.0f));
                        int x_end   = std::min(63, int((seg.to - 300.0f) / 700.0f * 64.0f));
                        it.filled_rectangle(x_start, 9, x_end - x_start + 1, 2, seg.color);
                }

                int orp_x = int((orp - 300.0f) / 700.0f * 64.0f);
                if (orp_x >= 0 && orp_x < 64) {
                        it.line(orp_x, 8, orp_x, 11, COLOR_WHITE);
                }
        } else {
                it.printf(2, 0, id(small_font), COLOR_WHITE, TextAlign::TOP_LEFT, show_ph ? "pH --" : "ORP --");
                it.filled_rectangle(0, 9, 64, 2, COLOR_DIM_RED);
        }

        // Show current time (top right)
        if (now.is_valid()) {
            char time_str[6];
            snprintf(time_str, sizeof(time_str), "%02d:%02d", now.hour, now.minute);
            it.printf(40, 0, id(small_font), COLOR_TIME, TextAlign::TOP_LEFT, "%s", time_str);
        } else {
            it.printf(40, 0, id(small_font), COLOR_TIME, TextAlign::TOP_LEFT, "--:--");
        }

        // RPM bar (2px high, under pH/ORP bar with 1px spacing)
        if (id(pool_pump_rpm).has_state()) {
                float rpm = id(pool_pump_rpm).state;
                int bar_width = int(rpm / 2900.0f * 64.0f);
                bar_width = (bar_width < 0) ? 0 : (bar_width > 64 ? 64 : bar_width);
                it.filled_rectangle(0, 12, bar_width, 2, COLOR_GRAY);
        } else {
                it.filled_rectangle(0, 12, 64, 2, COLOR_RED);
        }

        // Temperature with optional heater icon
        if (id(bestway_temperature_sensor).has_state()) {
            float temp = id(bestway_temperature_sensor).state;
            const Color& temp_color = (temp > 27.0f) ? COLOR_RED
                : (temp > 22.0f) ? COLOR_YELLOW
                : COLOR_BLUE;
            it.printf(2, 13, id(big_font), temp_color, TextAlign::TOP_LEFT, "%.1f°C", temp);

            if (id(heater_mode).has_state() && (id(heater_mode).state == "auto" || id(heater_mode).state == "heat")) {
                it.image(46, 24, id(heater_icon), COLOR_RED);
            }
        } else {
            it.printf(2, 13, id(big_font), COLOR_RED, TextAlign::TOP_LEFT, "--°C");
        }

        // Power consumption bar (red), under temperature
        if (id(pool_power_consumption).has_state()) {
            float watts = id(pool_power_consumption).state;
            int bar_width = int(watts / 2000.0f * 64.0f);
            bar_width = (bar_width < 0) ? 0 : (bar_width > 64 ? 64 : bar_width);
            it.filled_rectangle(0, 29, bar_width, 1, COLOR_RED);
        } else {
            it.filled_rectangle(0, 29, 64, 1, COLOR_DIM_RED);
        }

        // Always show number of people in pool (bottom left corner)
        if (id(pooldetect_person_active_count).has_state()) {
            it.printf(54, 24, id(small_font), COLOR_WHITE, TextAlign::BOTTOM_LEFT, "%d", (int)id(pooldetect_person_active_count).state);
        } else {
            it.printf(54, 24, id(small_font), COLOR_RED, TextAlign::BOTTOM_LEFT, "--");
        }

        // === NEW: Altan media player controls (lower right of left panel) ===
        
        // Volume bar (far right edge of left panel, x=63, 1px wide, max 15px height, from bottom up)
        if (id(altan_volume).has_state()) {
            float volume = id(altan_volume).state;
            if (volume < 0.0f) volume = 0.0f;
            if (volume > 1.0f) volume = 1.0f;
            int bar_height = int(volume * 15);
            // Draw from bottom (y=31) upwards
            it.filled_rectangle(63, 31 - bar_height, 1, bar_height, COLOR_DARK_GRAY);
        }

        // Playback state icon (lower right corner of left panel, 8x8px, dark grey, just left of volume bar)
        if (id(altan_media_state).has_state()) {
            const std::string& state = id(altan_media_state).state;
            if (state == "playing") {
                it.image(52, 24, id(icon_play), COLOR_DARK_GRAY);
            } else if (state == "paused") {
                it.image(52, 24, id(icon_pause), COLOR_DARK_GRAY);
            } else if (state == "idle" || state == "off") {
                it.image(52, 24, id(icon_stop), COLOR_DARK_GRAY);
            }
        }

        // === END NEW SECTION ===

        // Common constants for right panel (cached at lambda start)
        const int left_bound = 65;
        const int right_bound = 127;
        const int max_width_px = right_bound - left_bound;
        const int center_x = left_bound + (right_bound - left_bound) / 2;

        // Pixel-art weather icon drawing functions (using rectangles and lines for pixel-perfect display)
        auto draw_sunny = [&](int x, int y) {
            // Sun: square center with rays (pixel-art style)
            it.filled_rectangle(x + 6, y + 6, 4, 4, COLOR_SUN_YELLOW);
            // Rays (8 directions) - light yellow
            it.line(x + 8, y + 0, x + 8, y + 2, COLOR_SUN_YELLOW);  // Top
            it.line(x + 8, y + 14, x + 8, y + 16, COLOR_SUN_YELLOW);  // Bottom
            it.line(x + 0, y + 8, x + 2, y + 8, COLOR_SUN_YELLOW);  // Left
            it.line(x + 14, y + 8, x + 16, y + 8, COLOR_SUN_YELLOW);  // Right
            it.line(x + 2, y + 2, x + 3, y + 3, COLOR_SUN_YELLOW);  // Top-left
            it.line(x + 13, y + 13, x + 14, y + 14, COLOR_SUN_YELLOW);  // Bottom-right
            it.line(x + 13, y + 2, x + 14, y + 3, COLOR_SUN_YELLOW);  // Top-right
            it.line(x + 2, y + 13, x + 3, y + 14, COLOR_SUN_YELLOW);  // Bottom-left
        };

        auto draw_cloudy = [&](int x, int y) {
            // Simple cloud shape (pixel-art)
            it.filled_rectangle(x + 2, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 5, y + 5, 5, 4, COLOR_WHITE);
            it.filled_rectangle(x + 10, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 3, y + 9, 2, 2, COLOR_WHITE);
            it.filled_rectangle(x + 11, y + 9, 2, 2, COLOR_WHITE);
        };

        auto draw_partlycloudy = [&](int x, int y) {
            // Sun partially behind cloud (pixel-art)
            it.filled_rectangle(x + 3, y + 3, 4, 4, COLOR_SUN_YELLOW);  // Sun - yellow
            it.line(x + 5, y + 1, x + 5, y + 2, COLOR_SUN_YELLOW);
            it.line(x + 5, y + 8, x + 5, y + 9, COLOR_SUN_YELLOW);
            it.line(x + 1, y + 5, x + 2, y + 5, COLOR_SUN_YELLOW);
            it.line(x + 8, y + 5, x + 9, y + 5, COLOR_SUN_YELLOW);
            // Cloud covering part of sun - white
            it.filled_rectangle(x + 7, y + 8, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 10, y + 7, 5, 4, COLOR_WHITE);
            it.filled_rectangle(x + 13, y + 8, 3, 3, COLOR_WHITE);
        };

        auto draw_rainy = [&](int x, int y) {
            // Cloud (pixel-art) - white
            it.filled_rectangle(x + 2, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 5, y + 5, 5, 4, COLOR_WHITE);
            it.filled_rectangle(x + 10, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 3, y + 9, 2, 2, COLOR_WHITE);
            it.filled_rectangle(x + 11, y + 9, 2, 2, COLOR_WHITE);
            // Rain drops - light blue
            it.line(x + 6, y + 10, x + 6, y + 12, COLOR_RAIN_BLUE);
            it.line(x + 9, y + 11, x + 9, y + 13, COLOR_RAIN_BLUE);
            it.line(x + 12, y + 10, x + 12, y + 12, COLOR_RAIN_BLUE);
        };

        auto draw_snowy = [&](int x, int y) {
            // Cloud (pixel-art) - white
            it.filled_rectangle(x + 2, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 5, y + 5, 5, 4, COLOR_WHITE);
            it.filled_rectangle(x + 10, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 3, y + 9, 2, 2, COLOR_WHITE);
            it.filled_rectangle(x + 11, y + 9, 2, 2, COLOR_WHITE);
            // Snowflakes (simple crosses) - white
            it.line(x + 6, y + 10, x + 6, y + 12, COLOR_SNOW_WHITE);
            it.line(x + 5, y + 11, x + 7, y + 11, COLOR_SNOW_WHITE);
            it.line(x + 9, y + 11, x + 9, y + 13, COLOR_SNOW_WHITE);
            it.line(x + 8, y + 12, x + 10, y + 12, COLOR_SNOW_WHITE);
            it.line(x + 12, y + 10, x + 12, y + 12, COLOR_SNOW_WHITE);
            it.line(x + 11, y + 11, x + 13, y + 11, COLOR_SNOW_WHITE);
        };

        auto draw_lightning = [&](int x, int y) {
            // Cloud (pixel-art) - white
            it.filled_rectangle(x + 2, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 5, y + 5, 5, 4, COLOR_WHITE);
            it.filled_rectangle(x + 10, y + 6, 3, 3, COLOR_WHITE);
            it.filled_rectangle(x + 3, y + 9, 2, 2, COLOR_WHITE);
            it.filled_rectangle(x + 11, y + 9, 2, 2, COLOR_WHITE);
            // Lightning bolt (zigzag pixel-art) - bright yellow
            it.filled_rectangle(x + 9, y + 8, 2, 1, COLOR_LIGHTNING_YELLOW);
            it.filled_rectangle(x + 10, y + 9, 1, 2, COLOR_LIGHTNING_YELLOW);
            it.filled_rectangle(x + 9, y + 11, 2, 1, COLOR_LIGHTNING_YELLOW);
            it.filled_rectangle(x + 10, y + 12, 1, 2, COLOR_LIGHTNING_YELLOW);
        };

        auto draw_fog = [&](int x, int y) {
            // Horizontal fog lines
            it.filled_rectangle(x + 2, y + 4, 12, 2, COLOR_WHITE);
            it.filled_rectangle(x + 4, y + 8, 10, 2, COLOR_WHITE);
            it.filled_rectangle(x + 2, y + 12, 12, 2, COLOR_WHITE);
        };

        // Helper function to get the next UTF-8 character as a substring
        auto get_utf8_char = [](const std::string& str, size_t& pos) -> std::string {
            if (pos >= str.length()) return "";
            
            // Calculate UTF-8 character length
            unsigned char c = static_cast<unsigned char>(str[pos]);
            size_t len;
            if (c < 0x80) {
                len = 1;  // ASCII
            } else if ((c & 0xE0) == 0xC0) {
                len = 2;  // 2-byte UTF-8 (ä, ö, å)
            } else if ((c & 0xF0) == 0xE0) {
                len = 3;  // 3-byte UTF-8
            } else if ((c & 0xF8) == 0xF0) {
                len = 4;  // 4-byte UTF-8
            } else {
                len = 1;  // Fallback
            }
            
            std::string result = str.substr(pos, len);
            pos += len;
            return result;
        };

        auto has_extended_chars = [](const std::string& text) -> bool {
            for (unsigned char c : text) {
                if (c & 0x80) {
                    return true;
                }
            }
            return false;
        };

        // Reusable scrolling text function with UTF-8 support
        auto render_scrolling_text = [&](ScrollCache& cache, const std::string& text, int y_pos,
                                          int char_width, int scroll_offset_id, const Color& color,
                                          const std::string& separator, auto& primary_font_id,
                                          auto& utf8_font_id) {
            bool use_utf8_font = has_extended_chars(text);
            auto& active_font = use_utf8_font ? utf8_font_id : primary_font_id;

            if (!use_utf8_font) {
                int text_width_px = text.length() * char_width;

                if (text_width_px > max_width_px) {
                    std::string base = text + separator;
                    std::string scroll_text = base + base;
                    int scroll_px = base.length() * char_width;
                    int offset = scroll_offset_id % (scroll_px + 20);
                    int effective_offset = offset < 20 ? 0 : offset - 20;

                    for (size_t i = 0; i < scroll_text.length(); i++) {
                        int char_x = left_bound - effective_offset + i * char_width;
                        if (char_x >= left_bound && char_x <= right_bound) {
                            it.printf(char_x, y_pos, primary_font_id, color, TextAlign::TOP_LEFT, "%c", scroll_text[i]);
                        }
                    }
                } else {
                    int text_center_x = left_bound + (max_width_px - text_width_px) / 2;
                    it.printf(text_center_x, y_pos, primary_font_id, color, TextAlign::TOP_LEFT, "%s", text.c_str());
                }
                return;
            }

            if (cache.last_text != text || cache.last_separator != separator) {
                cache.last_text = text;
                cache.last_separator = separator;
                cache.base_chars.clear();
                cache.scroll_chars.clear();

                size_t pos = 0;
                while (pos < text.length()) {
                    cache.base_chars.push_back(get_utf8_char(text, pos));
                }

                cache.base_text_width_px = cache.base_chars.size() * char_width;

                if (cache.base_text_width_px > max_width_px) {
                    cache.scroll_chars = cache.base_chars;
                    for (size_t i = 0; i < separator.length(); i++) {
                        cache.scroll_chars.push_back(std::string(1, separator[i]));
                    }
                    cache.scroll_px = cache.scroll_chars.size() * char_width;
                    auto loop_chars = cache.scroll_chars;
                    cache.scroll_chars.insert(cache.scroll_chars.end(),
                                              loop_chars.begin(),
                                              loop_chars.end());
                } else {
                    cache.scroll_px = 0;
                }
            }

            if (cache.base_text_width_px > max_width_px && cache.scroll_px > 0) {
                int offset = scroll_offset_id % (cache.scroll_px + 20);
                int effective_offset = offset < 20 ? 0 : offset - 20;

                for (size_t i = 0; i < cache.scroll_chars.size(); i++) {
                    int char_x = left_bound - effective_offset + i * char_width;
                    if (char_x >= left_bound && char_x <= right_bound) {
                        it.printf(char_x, y_pos, utf8_font_id, color, TextAlign::TOP_LEFT, "%s", cache.scroll_chars[i].c_str());
                    }
                }
            } else {
                it.printf(center_x, y_pos, active_font, color, TextAlign::TOP_CENTER, "%s", text.c_str());
            }
        };

        // Page 0: Spotify
        if (id(display_page) == 0) {
                const std::string& artist = id(spotify_media_artist).has_state() ? id(spotify_media_artist).state : "";
                const std::string& title = id(spotify_media_title).has_state() ? id(spotify_media_title).state : "";
                const std::string sep = "   -=-   ";

                // Use spleen-5x8 which has Swedish character support built-in
                render_scrolling_text(artist_cache, artist, 8, 5, id(scroll_offset_artist),
                                      COLOR_WHITE, sep, id(small_font), id(small_font_utf8));
                render_scrolling_text(title_cache, title, 21, 5, id(scroll_offset_title),
                                      COLOR_SPOTIFY_TITLE, sep, id(small_font), id(small_font_utf8));
        }

        // Page 1: Custom message
        else if (id(display_page) == 1) {
          if (id(custom_display_text).has_state()) {
            const std::string& message = id(custom_display_text).state;
            render_scrolling_text(custom_cache, message, 16, 4, id(scroll_offset_title),
                                  COLOR_WHITE, "     ", id(small_font), id(small_font_utf8));
          }
        }

        // Page 2: Weather
        else if (id(display_page) == 2) {
            if (id(weather_condition).has_state()) {
                const std::string& cond = id(weather_condition).state;
                int icon_x = 113;
                int icon_y = 0;
                // Pixel-art icons drawn directly
                if (cond == "sunny") {
                    draw_sunny(icon_x, icon_y);
                } else if (cond == "partlycloudy") {
                    draw_partlycloudy(icon_x, icon_y);
                } else if (cond == "cloudy") {
                    draw_cloudy(icon_x, icon_y);
                } else if (cond == "rainy") {
                    draw_rainy(icon_x, icon_y);
                } else if (cond == "snowy") {
                    draw_snowy(icon_x, icon_y);
                } else if (cond == "lightning") {
                    draw_lightning(icon_x, icon_y);
                } else if (cond == "fog") {
                    draw_fog(icon_x, icon_y);
                }
            }

            if (id(weather_temp).has_state()) {
                it.printf(90, 20, id(big_font), COLOR_WHITE, TextAlign::CENTER, "%.1f°C", id(weather_temp).state);
            }
        }

        // Page 3: Pool stats
        else if (id(display_page) == 3) {

            if (id(pooldetect_person_active_count).has_state()) {
                int people = (int)id(pooldetect_person_active_count).state;
                it.printf(center_x, 3, id(small_font), COLOR_CYAN, TextAlign::CENTER, "In pool: %d", people);
            } else {
                it.printf(center_x, 3, id(small_font), COLOR_RED, TextAlign::CENTER, "In pool: --");
            }

            if (id(pool_max_people).has_state()) {
                it.printf(center_x, 15, id(small_font), COLOR_YELLOW, TextAlign::CENTER, "Peak: %d", (int)id(pool_max_people).state);
            } else {
                it.printf(center_x, 15, id(small_font), COLOR_RED, TextAlign::CENTER, "Peak: --");
            }

            if (id(current_pool_session_duration).has_state()) {
                int total_seconds = (int)(id(current_pool_session_duration).state * 60);
                if (total_seconds >= 0 && total_seconds < 360000) {
                    int mins = total_seconds / 60;
                    it.printf(center_x, 25, id(small_font), COLOR_GREEN, TextAlign::CENTER, "%d min", mins);
                }
            } else {
                it.printf(center_x, 25, id(small_font), COLOR_RED, TextAlign::CENTER, "Tid: --");
            }
        }

        // Page 4: Stop Timer
        else if (id(display_page) == 4) {

          unsigned long ms = id(stop_timer_millis);
          int total_secs = ms / 1000;
          int mins = total_secs / 60;
          int secs = total_secs % 60;
          int tenths = (ms % 1000) / 100;

          it.printf(center_x, 8, id(big_font), COLOR_WHITE, TextAlign::CENTER, "%02d:%02d.%d", mins, secs, tenths);

          if (id(stop_timer_running).state) {
            it.printf(center_x, 25, id(small_font), COLOR_GREEN, TextAlign::CENTER, "Running");
          } else {
            it.printf(center_x, 25, id(small_font), COLOR_RED, TextAlign::CENTER, "Stopped");
          }
        }

        // Page 5: DEBUG
        else if (id(display_page) == 5) {
          it.printf(66, 0, id(small_font), COLOR_DEBUG_YELLOW, TextAlign::TOP_LEFT, "DEBUG");

          if (id(esp32_temp).has_state()) {
            float t = id(esp32_temp).state;
            if (!isnan(t)) {
              it.printf(66, 9, id(small_font), COLOR_WHITE, TextAlign::TOP_LEFT,
                        "Temp: %.1fC", t);
            }
          }

          if (id(wifi_strength).has_state()) {
            it.printf(66, 16, id(small_font), COLOR_DEBUG_BLUE, TextAlign::TOP_LEFT,
                      "WiFi: %.0f dBm", id(wifi_strength).state);
          }

          it.printf(66, 23, id(small_font), COLOR_DEBUG_GREEN, TextAlign::TOP_LEFT,
                    "Uptime: %u min", (unsigned)(millis() / 60000));
        }
